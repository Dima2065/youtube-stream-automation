name: Create YouTube Stream

on:
  workflow_dispatch:

  schedule:
    - cron: '0 4 * * 6'

jobs:
  create-stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create client_secret.json
        run: |
          cat > client_secret.json << 'EOF'
          ${{ secrets.CLIENT_SECRET_JSON }}
          EOF

      - name: Run stream creator
        env:
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
        run: python create_stream.py
